{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="page-shell login-panel">
  <div class="page-heading">
    <div>
      <p class="eyebrow">Protected console</p>
      <h2 class="page-title">Login</h2>
      <p class="page-copy">Authenticate to access local administration controls.</p>
    </div>
  </div>

  <section class="card">
    <form class="form-stack" method="post">
      <input type="hidden" name="next" value="{{ next }}">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" placeholder="Optional">
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn success">Login</button>
    </form>
  </section>
</section>
{% endblock %}
