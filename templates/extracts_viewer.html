{% extends "base.html" %}
{% set page_title = item.pdf[:-4] if item.pdf.lower().endswith('.pdf') else item.pdf %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="page-shell">
<div class="page-heading">
  <div>
    <p class="eyebrow">Document viewer</p>
    <h2 class="extract-title">{{ page_title }}</h2>
  </div>
</div>

<div id="toolbar" class="sticky-toolbar">
  <button type="button" onclick="zoomOut()" title="Zoom out">Zoom -</button>
  <button type="button" onclick="zoomIn()" title="Zoom in">Zoom +</button>
  <button type="button" onclick="rotate()" title="Rotate document">Rotate</button>
  <button type="button" onclick="fitToPage()" title="Reset view">Reset View</button>
</div>

<div class="toolbar-spacer"></div>

<div class="viewer-scroll">
  <div id="images-container" class="{{ item.orientation }}">
    {% for jpg in item.jpgs %}
      <img
        src="{{ url_for('send_jpg', filename=jpg) }}"
        alt="{{ page_title }} page {{ loop.index }}"
        class="extract-image"
        loading="{{ 'eager' if loop.first else 'lazy' }}"
        decoding="async">
    {% endfor %}
  </div>
</div>

<style>
  #images-container {
    width: 100%;
  }

  .extract-image {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto 16px auto;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    transform-origin: top center;
    content-visibility: auto;
    contain: layout style paint;
    contain-intrinsic-size: 1550px 1100px;
  }
</style>

<script>
  let viewerZoom = 1;
  let viewerRotation = 0;

  function applyViewerTransform() {
    document.querySelectorAll('.extract-image').forEach((img) => {
      img.style.transform = `scale(${viewerZoom}) rotate(${viewerRotation}deg)`;
    });
  }

  function zoomIn() {
    viewerZoom = Math.min(3, viewerZoom + 0.1);
    applyViewerTransform();
  }

  function zoomOut() {
    viewerZoom = Math.max(0.3, viewerZoom - 0.1);
    applyViewerTransform();
  }

  function rotate() {
    viewerRotation = (viewerRotation + 90) % 360;
    applyViewerTransform();
  }

  function fitToPage() {
    viewerZoom = 1;
    viewerRotation = 0;
    applyViewerTransform();
  }

  function setToolbarHeight() {
    const toolbar = document.getElementById('toolbar');
    if (!toolbar) return;
    document.documentElement.style.setProperty('--toolbar-h', Math.ceil(toolbar.getBoundingClientRect().height) + 'px');
  }

  document.addEventListener('DOMContentLoaded', setToolbarHeight);
  window.addEventListener('load', setToolbarHeight, { passive: true });
  window.addEventListener('resize', setToolbarHeight);
</script>
</section>
{% endblock %}
